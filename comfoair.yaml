esphome:
  name: comfoair
  friendly_name: comfoair

esp8266:
  board: esp01_1m

# Enable logging
logger:
  level: DEBUG
  logs:
      comfoair: DEBUG
      sensor: ERROR
      binary_sensor: ERROR
      text_sensor: ERROR
      climate: ERROR
  baud_rate: 0 #Disabling logging to serial port which is used for RS232-chip communication

web_server:
  port: 80
  include_internal: True
  ota: True
  

# Enable Home Assistant API
api:
  encryption:
    key: "SET-YOUR-OWN-VALUE"



ota:
  - platform: esphome
    password: "SET-YOUR-OWN-VALUE"


sensor:
binary_sensor:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp8266-Comfoair"
    password: "SET-YOUR-OWN-VALUE"

captive_portal:

external_components:
  - source:
      type: git
      #url: https://github.com/wichers/esphome-comfoair
      url: https://github.com/linuxlurak/esphome-comfoair
    components: [comfoair]
    refresh: 0s
uart:
  id: uart_bus
  rx_pin: 3
  tx_pin: 1
  baud_rate: 9600

comfoair:
  name: "ComfoAir 350"
  uart_id: uart_bus
